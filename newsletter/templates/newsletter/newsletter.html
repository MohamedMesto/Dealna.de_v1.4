{% extends "base.html" %}
{% load static %}


{% block page_header %}
<div class="container header-container">
    <div class="row">
        <div class="col"></div>
    </div>
</div>
{% endblock %}


{% block content %}
<div class="container newsletter-page mb-5">
 
<h1 class="mb-3 mt-4 mt-md-0 text-center text-black ">
  Stay Updated with Dealna.de
</h1>
<p class="text-muted text-center d-md-none">
  Get the latest deals straight to your inbox
</p>

  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <form action="{% url 'newsletter:newsletter' %}" method="POST" class="mt-3">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="text-center mt-4">
              <button type="submit" class="btn btn-warning px-4">Subscribe</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
